services:
  ncview:
    image: epinux/ncmet:latest
    build:
      context: ./docker
    ports:
      - "7000:7000"
    environment:
      # BOKEH_ALLOW_WS_ORIGIN: '*'
      PORT: '7000'
      LOG_LEVEL: 'debug'
      BOKEH_LOG_LEVEL: 'debug'
      TSPLOT_DOWNLOAD: '/tspt/Download'
      PROCESSING_ENDPOINT: 'https://met.no'
      DOWNLOAD_ENDPOINT: 'https://met.no'
      PYTHONUNBUFFERED: 1
      # /opt/metviz is the import root for the shared `common` package
      # (mounted below at /opt/metviz/common).
      PYTHONPATH: '$${PYTHONPATH}:/app:/seaice:/seaicemod:/opt/metviz'
      SEAICE_APP_ROOT: '/seaice'
      SEAICEMOD_APP_ROOT: '/seaicemod'
    # hostname: ncmet
    # networks:
    #   - net
    volumes:
      # - ./metviz/seaicemod:/seaicemod
      - ./metviz/trj:/trj
      # - ./metviz/seaice:/seaice
      # - ./metviz/trajectory:/trajectory
      # - ./metviz/mapdap:/mapdap
      # - ./metviz/tspt:/tspt
      - ./metviz/TSP:/TSP
      - ./metviz/catalog:/Catalog
      - ./metviz/OGC_client:/OGC_client
      # Shared helpers imported by both Panel apps as `from common... import ...`
      - ./metviz/common:/opt/metviz/common
      - ./metviz/OGC_client:/OGC_client
      - ./metviz/assets:/assets
      - ./docker/entrypoint.sh:/entrypoint.sh
      # - ./credentials.json:/credentials.json:ro
    entrypoint: ["/entrypoint.sh"]


